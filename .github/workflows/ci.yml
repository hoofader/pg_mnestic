# SPDX-License-Identifier: AGPL-3.0-only
name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      # Pinned to match rust-toolchain.toml; bump both together so a new clippy release can't
      # fail -D warnings on an unrelated change.
      - uses: dtolnay/rust-toolchain@1.90.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # All features so the feature-gated provider, serve, and CLI code is checked too.
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.90.0
      - uses: Swatinem/rust-cache@v2
      - uses: docker/setup-buildx-action@v3
      # The integration tests run against a custom Postgres image (pgvector + pg_graphwright,
      # built from source via pgrx). Build it and load it into the runner's Docker daemon as
      # `mnestic-pg:dev` so testcontainers finds it locally. The pgrx compile is cached across
      # runs via the GHA build cache, so only a Dockerfile/ref change pays the full build.
      - uses: docker/build-push-action@v6
        with:
          context: docker/pg
          file: docker/pg/Dockerfile
          tags: mnestic-pg:dev
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # The live provider tests are #[ignore], so no API keys are needed.
      # --all-features so feature-gated tests (e.g. the `rerank` TEI client) actually run.
      - run: cargo test --workspace --all-features

  conformance:
    name: sdk conformance
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.90.0
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: docker/pg
          file: docker/pg/Dockerfile
          tags: mnestic-pg:dev
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Drive the real supermemory SDK against a live, keyless pg_mnestic (mock providers, so no
      # API keys), proving the SDK is a drop-in client. See docs/05-clients.md.
      - name: Run sdk-ts conformance
        run: |
          set -euo pipefail
          docker run -d --name pg -e POSTGRES_PASSWORD=postgres -p 5432:5432 mnestic-pg:dev
          for _ in $(seq 1 30); do docker exec pg pg_isready -U postgres && break; sleep 2; done
          cargo build --features serve --bin serve
          cargo build --features cli --bin issue-key
          export DATABASE_URL="postgres://postgres:postgres@localhost:5432/postgres"
          MNESTIC_MOCK_PROVIDERS=1 MNESTIC_BIND=127.0.0.1:8080 ./target/debug/serve &
          for _ in $(seq 1 60); do curl -fsS http://127.0.0.1:8080/health && break; sleep 1; done
          TOKEN=$(./target/debug/issue-key conformance ci | sed -n 's/^token.*: //p')
          cd conformance/sdk-ts
          npm ci --no-audit --no-fund
          SUPERMEMORY_BASE_URL=http://127.0.0.1:8080 SUPERMEMORY_API_KEY="$TOKEN" node conformance.mjs
