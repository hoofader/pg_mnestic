# SPDX-License-Identifier: AGPL-3.0-only
name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      # Pinned to match rust-toolchain.toml; bump both together so a new clippy release can't
      # fail -D warnings on an unrelated change.
      - uses: dtolnay/rust-toolchain@1.90.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # All features so the feature-gated provider, serve, and CLI code is checked too.
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.90.0
      - uses: Swatinem/rust-cache@v2
      - uses: docker/setup-buildx-action@v3
      # The integration tests run against a custom Postgres image (pgvector + pg_graphwright,
      # built from source via pgrx). Build it and load it into the runner's Docker daemon as
      # `mnestic-pg:dev` so testcontainers finds it locally. The pgrx compile is cached across
      # runs via the GHA build cache, so only a Dockerfile/ref change pays the full build.
      - uses: docker/build-push-action@v6
        with:
          context: docker/pg
          file: docker/pg/Dockerfile
          tags: mnestic-pg:dev
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # The live provider tests are #[ignore], so no API keys are needed.
      # --all-features so feature-gated tests (e.g. the `rerank` TEI client) actually run.
      - run: cargo test --workspace --all-features
